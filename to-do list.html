<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 10px gray;
        }

        input {
            padding: 8px;
            width: 70%;
        }

        button {
            padding: 8px;
            cursor: pointer;
        }

        li {
            margin: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input id="task" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
</div>

<script>
function addTask() {
    var task = document.getElementById("task").value;

    if (task == "") {
        alert("Enter a task");
        return;
    }

    var li = document.createElement("li");
    li.innerText = task;

    document.getElementById("list").appendChild(li);

    document.getElementById("task").value = "";
}
</script>

</body>
</html>
